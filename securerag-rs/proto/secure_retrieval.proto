syntax = "proto3";

package securerag;

import "google/protobuf/struct.proto";

service SecureRetrieval {
  rpc Chunk (ChunkRequest) returns (ChunkResponse);
  rpc Sanitize (SanitizeRequest) returns (SanitizeResponse);
  rpc BuildIndex (BuildIndexRequest) returns (BuildIndexResponse);
  rpc GenerateDecoys (GenerateDecoysRequest) returns (GenerateDecoysResponse);
  rpc BatchRetrieve (BatchRetrieveRequest) returns (BatchRetrieveResponse);
  rpc EmbedWithNoise (EmbedWithNoiseRequest) returns (EmbedWithNoiseResponse);
  rpc RetrieveByEmbedding (RetrieveByEmbeddingRequest) returns (RetrieveByEmbeddingResponse);
  rpc EncryptedSearch (EncryptedSearchRequest) returns (EncryptedSearchResponse);
}

message ChunkRequest {
  repeated google.protobuf.Struct docs = 1;
  int32 chunk_size = 2;
  int32 overlap = 3;
}

message ChunkResponse {
  repeated google.protobuf.Struct chunks = 1;
}

message SanitizeRequest {
  repeated google.protobuf.Struct chunks = 1;
}

message SanitizeResponse {
  repeated google.protobuf.Struct chunks = 1;
}

message BuildIndexRequest {
  string protocol = 1;
  repeated google.protobuf.Struct chunks = 2;
  double epsilon = 3;
  double delta = 4;
  string encrypted_search_scheme = 5;
}

message BuildIndexResponse {
  string index_id = 1;
  int32 doc_count = 2;
}

message GenerateDecoysRequest {
  string index_id = 1;
  string query = 2;
  int32 k = 3;
}

message GenerateDecoysResponse {
  repeated string decoys = 1;
}

message BatchRetrieveRequest {
  string index_id = 1;
  repeated string queries = 2;
  int32 top_k = 3;
}

message BatchRetrieveResponse {
  repeated RetrievalList rows = 1;
}

message EmbedWithNoiseRequest {
  string query = 1;
  double sigma = 2;
}

message EmbedWithNoiseResponse {
  repeated double embedding = 1;
}

message RetrieveByEmbeddingRequest {
  string index_id = 1;
  repeated double embedding = 2;
  int32 top_k = 3;
  string query = 4;
  double sigma = 5;
}

message RetrieveByEmbeddingResponse {
  repeated google.protobuf.Struct rows = 1;
}

message EncryptedSearchRequest {
  string index_id = 1;
  google.protobuf.Struct encrypted_query = 2;
  int32 top_k = 3;
}

message EncryptedSearchResponse {
  repeated google.protobuf.Struct rows = 1;
}

message RetrievalList {
  repeated google.protobuf.Struct rows = 1;
}
